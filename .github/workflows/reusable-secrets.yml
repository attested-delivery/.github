# Reusable workflow: secret scanning — Gitleaks + TruffleHog over all constituents.
#
# Hook scripts and bundled plugin/MCP source can leak credentials. Gitleaks and
# TruffleHog produce largely NON-OVERLAPPING true positives (report Pillar 2), so
# both run. Gitleaks findings normalize on SARIF → code-scanning hub (soft-fail,
# the gate) and seam-attest as `secrets/v1`; TruffleHog runs in verified-only mode
# and HARD-FAILS the job if it confirms a live secret (a verified credential is not
# advisory). Both tools install as checksum-verified release binaries — no
# third-party action, no allow-list entry.
#
# Usage:
#   jobs:
#     secrets:
#       permissions:
#         contents: read
#         security-events: write
#         actions: read
#       uses: attested-delivery/.github/.github/workflows/reusable-secrets.yml@<sha>
#       with:
#         directory: .

name: secrets

on:
  workflow_call:
    inputs:
      directory:
        description: 'Directory to scan'
        required: false
        type: string
        default: '.'
      gitleaks-version:
        description: 'Pinned Gitleaks version (no v prefix)'
        required: false
        type: string
        default: '8.30.1'
      trufflehog-version:
        description: 'Pinned TruffleHog version (no v prefix)'
        required: false
        type: string
        default: '3.95.6'
      fail-on-verified:
        description: 'Fail the job if TruffleHog confirms a verified live secret'
        required: false
        type: boolean
        default: true
    outputs:
      sarif-artifact:
        description: 'Artifact name holding the Gitleaks SARIF (attestation seam)'
        value: secrets-sarif
      sarif-filename:
        description: 'Gitleaks SARIF filename within the artifact'
        value: gitleaks.sarif

permissions:
  contents: read

jobs:
  secrets:
    name: secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Gitleaks + TruffleHog (checksum-verified)
        env:
          GL_VER: ${{ inputs.gitleaks-version }}
          TH_VER: ${{ inputs.trufflehog-version }}
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/secrets-bin"; mkdir -p "${dest}"
          dl() { curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 -o "$1" "$2"; }
          # Gitleaks
          glbase="https://github.com/gitleaks/gitleaks/releases/download/v${GL_VER}"
          dl "${dest}/gl.tgz"    "${glbase}/gitleaks_${GL_VER}_linux_x64.tar.gz"
          dl "${dest}/gl.sums"   "${glbase}/gitleaks_${GL_VER}_checksums.txt"
          ( cd "${dest}" && grep " gitleaks_${GL_VER}_linux_x64.tar.gz\$" gl.sums | sha256sum --check --strict - )
          tar -xzf "${dest}/gl.tgz" -C "${dest}" gitleaks
          # TruffleHog
          thbase="https://github.com/trufflesecurity/trufflehog/releases/download/v${TH_VER}"
          dl "${dest}/th.tgz"    "${thbase}/trufflehog_${TH_VER}_linux_amd64.tar.gz"
          dl "${dest}/th.sums"   "${thbase}/trufflehog_${TH_VER}_checksums.txt"
          ( cd "${dest}" && grep " trufflehog_${TH_VER}_linux_amd64.tar.gz\$" th.sums | sha256sum --check --strict - )
          tar -xzf "${dest}/th.tgz" -C "${dest}" trufflehog
          chmod +x "${dest}/gitleaks" "${dest}/trufflehog"
          echo "${dest}" >> "$GITHUB_PATH"

      - name: Gitleaks → SARIF (soft-fail)
        env:
          SCAN_DIR: ${{ inputs.directory }}
        run: |
          set -euo pipefail
          # --exit-code 0: report to code scanning (the gate), do not fail the job.
          gitleaks dir "${SCAN_DIR}" --report-format sarif --report-path gitleaks.sarif --exit-code 0 --no-banner
          test -f gitleaks.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"gitleaks"}},"results":[]}]}' > gitleaks.sarif
          echo "gitleaks results: $(python3 -c 'import json;print(len(json.load(open("gitleaks.sarif"))["runs"][0]["results"]))' 2>/dev/null || echo '?')"

      - name: TruffleHog (verified-only, hard-fail)
        env:
          SCAN_DIR: ${{ inputs.directory }}
          FAIL_VERIFIED: ${{ inputs.fail-on-verified }}
        run: |
          set -euo pipefail
          trufflehog filesystem "${SCAN_DIR}" --results=verified --json --no-update > trufflehog.json 2>/dev/null || true
          n="$(grep -c . trufflehog.json || true)"
          echo "TruffleHog verified findings: ${n:-0}"
          if [ "${FAIL_VERIFIED}" = "true" ] && [ "${n:-0}" -gt 0 ]; then
            echo "::error::TruffleHog confirmed ${n} VERIFIED live secret(s) — failing closed."
            exit 1
          fi

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload secrets evidence artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: secrets-sarif
          path: gitleaks.sarif
          if-no-files-found: error
